version: 2.1
orbs:
  lucos: lucos/deploy@0
jobs:
  test:
    docker:
      - image: cimg/node:25.0
    steps:
      - checkout
      - run:
          name: Install Dependencies
          command: npm install
          working_directory: src
      - run:
          name: Run Tests
          command: npm test
          working_directory: src
workflows:
  version: 2
  build-deploy:
    jobs:
      - test
      - lucos/build:
          serial-group: << pipeline.project.slug >>/build
      - lucos/deploy-avalon:
          serial-group: deploy-avalon
          requires:
            - test
            - lucos/build
          filters:
            branches:
              only:
                - main
